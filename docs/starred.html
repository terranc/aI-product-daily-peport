<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星标项目 · AI 产品雷达</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css">
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js" defer></script>
  <style>

    .star-hero { text-align:center; padding:40px 0 24px; }
    .star-hero h1 { font-size:1.75rem; font-weight:700; margin-bottom:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .star-hero h1 .star-ic { width:24px; height:24px; fill:var(--c-amber); stroke:var(--c-amber); }
    .star-hero p { color:var(--c-text-2); }
    .star-count { font-size:.85rem; color:var(--c-text-3); margin-top:8px; }
    .product-list { max-width:800px; margin:0 auto; padding-bottom:40px; }
    .product-item {
      display:flex; gap:16px; padding:16px;
      background:var(--c-surface); border:1px solid var(--c-border);
      border-radius:var(--radius); margin-bottom:12px;
      position:relative; transition:all .2s var(--ease);
    }
    .product-item:hover { border-color:var(--c-accent); box-shadow:var(--shadow-md); transform:translateY(-1px); }
    .product-link { display:flex; gap:16px; flex:1; min-width:0; text-decoration:none; color:inherit; }
    .product-thumb {
      width:64px; height:64px; flex-shrink:0; border-radius:6px;
      overflow:hidden; background:var(--c-tag-bg);
      display:flex; align-items:center; justify-content:center;
    }
    .product-thumb img { width:100%; height:100%; object-fit:cover; }
    .product-thumb .ph { width:28px; height:28px; border-radius:6px; background:linear-gradient(135deg,var(--c-accent),#818cf8); opacity:.3; }
    .product-info { flex:1; min-width:0; }
    .product-name { font-size:.95rem; font-weight:600; margin-bottom:4px; }
    .product-desc { font-size:.8rem; color:var(--c-text-2); line-height:1.6; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .product-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .product-score { font-size:1.1rem; font-weight:800; color:var(--c-accent); min-width:28px; text-align:center; }
    .product-date { font-size:.7rem; color:var(--c-text-3); }
    .product-tags { display:flex; gap:4px; }
    .product-tags .mini-tag { font-size:.6rem; padding:1px 6px; border-radius:3px; background:var(--c-tag-bg); color:var(--c-text-3); }
    .unstar-btn {
      position:absolute; top:10px; right:10px; z-index:2;
      width:26px; height:26px; border-radius:50%;
      border:none; background:var(--c-tag-bg); color:var(--c-text-3);
      font-size:.75rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .15s var(--ease); flex-shrink:0;
    }
    .unstar-btn:hover { background:#fee2e2; color:#dc2626; transform:scale(1.1); }
    .load-more-btn {
      display:inline-block; margin:24px auto; padding:12px 32px;
      background:var(--c-accent-l); color:var(--c-accent);
      border:1px solid var(--c-accent); border-radius:var(--radius);
      font-weight:600; font-size:.9rem; cursor:pointer;
      transition:all .15s var(--ease); text-decoration:none;
    }
    .load-more-btn:hover { background:var(--c-accent); color:#fff; }
    .loading { text-align:center; padding:40px; color:var(--c-text-3); }
    .no-results { text-align:center; padding:60px 20px; color:var(--c-text-3); }
    .no-results .empty-ic { font-size:2.5rem; margin-bottom:12px; }


    .product-modal-overlay { display:none; position:fixed; inset:0; z-index:9000; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .product-modal-overlay.active { display:block; }
    .product-modal-container { position:relative; max-width:1120px; width:90%; margin:40px auto; min-height:auto; background:var(--c-bg); border-radius:var(--radius-lg); box-shadow:0 8px 32px rgba(0,0,0,.2); overflow:hidden; }
    .product-modal-close { position:sticky; top:0; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--c-surface); border-bottom:1px solid var(--c-border); }
    .product-modal-close button { background:none; border:none; cursor:pointer; font-size:1rem; color:var(--c-text-2); padding:4px 8px; }
    .product-modal-close .title { font-weight:600; font-size:.9rem; color:var(--c-text); }
    .product-modal-body { padding:0; }
    .fancybox__container { z-index:10000; }

  </style>
</head>
<body>
  <header class="site-header">
  <div class="container-wide">
    <a href="./" class="site-logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2a6 6 0 0 1 0 12"/><circle cx="12" cy="8" r="1" fill="currentColor"/></svg> AI 产品雷达</a>
    <nav class="site-nav"><a href="./">每日简报</a><a href="weekly.html">每周深度</a><a href="archive.html">归档</a><a href="starred.html" class="nav-starred active"><svg class="star-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span class="nav-label">星标</span><span class="star-count-badge"></span></a><a href="https://github.com/terranc/aI-product-daily-peport" target="_blank"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a></nav>
  </div>
</header>
  <main>
    <div class="container">
      <div class="star-hero">
        <h1><svg class="star-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> 星标项目</h1>
        <p>你标记为值得关注的产品</p>
        <div class="star-count" id="star-count"></div>
      </div>
      <div class="product-list" id="product-list">
        <div class="loading">正在加载标星数据...</div>
      </div>
    </div>
  </main>
    <div class="product-modal-overlay" id="product-modal">
    <div class="product-modal-container">
      <div class="product-modal-close">
        <span class="title" id="modal-title"></span>
        <button onclick="closeProductModal()" aria-label="关闭">✕ 关闭</button>
      </div>
      <div class="product-modal-body" id="modal-body">
        <div style="text-align:center;padding:40px;color:var(--c-text-3)">加载中...</div>
      </div>
    </div>
  </div>
  <footer class="site-footer">
  <div class="container">
    <div class="footer-links">
      <a href="archive.html">历史归档</a>
      <a href="https://github.com/terranc/aI-product-daily-peport" target="_blank">GitHub</a>
    </div>
    <p>AI 产品雷达 · 自动化 AI 产品发现与分析</p>
  </div>
</footer>

  <script>

const STAR_KEY = 'ai_radar_starred';
function getStarredSlugs() {
  try { return JSON.parse(localStorage.getItem(STAR_KEY) || '[]'); } catch(e) { return []; }
}
function saveStarredSlugs(arr) {
  try { localStorage.setItem(STAR_KEY, JSON.stringify(arr)); } catch(e) {}
}
function isStarred(slug) {
  if (!slug) return false;
  return getStarredSlugs().indexOf(String(slug).toLowerCase()) !== -1;
}
function toggleStar(btn) {
  const slug = (btn.getAttribute('data-slug') || '').toLowerCase();
  if (!slug) return;
  let arr = getStarredSlugs();
  const idx = arr.indexOf(slug);
  const nowStarred = idx === -1;
  if (nowStarred) { arr.push(slug); } else { arr.splice(idx, 1); }
  saveStarredSlugs(arr);
  refreshStarButton(btn);
  updateStarBadges();
  window.dispatchEvent(new CustomEvent('star-changed', { detail: { slug: slug, starred: nowStarred } }));
}
function refreshStarButton(btn) {
  if (!btn || !btn.classList || !btn.classList.contains('btn-star')) return;
  const slug = (btn.getAttribute('data-slug') || '').toLowerCase();
  const starred = isStarred(slug);
  if (starred) {
    btn.classList.add('is-starred');
    btn.setAttribute('aria-pressed', 'true');
  } else {
    btn.classList.remove('is-starred');
    btn.setAttribute('aria-pressed', 'false');
  }
  const lbl = btn.querySelector('.star-label');
  if (lbl) lbl.textContent = starred ? '已标星' : '标星';
}
function updateStarBadges() {
  const count = getStarredSlugs().length;
  document.querySelectorAll('.star-count-badge').forEach(el => {
    el.textContent = count > 0 ? String(count) : '';
    el.style.display = count > 0 ? '' : 'none';
  });
}
function initStarButtons(root) {
  (root || document).querySelectorAll('.btn-star[data-slug]').forEach(btn => {
    refreshStarButton(btn);
  });
}
document.addEventListener('DOMContentLoaded', function() {
  updateStarBadges();
  initStarButtons(document);
});


// Modal 状态与核心函数（变量名与首页一致，保证 Modal HTML 的 onclick 可用）
let modal, modalBody, modalTitle, isModalOpen = false, lastListUrl = null;

function _ensureModalRefs() {
  if (!modal) {
    modal = document.getElementById('product-modal');
    modalBody = document.getElementById('modal-body');
    modalTitle = document.getElementById('modal-title');
  }
}

function rebaseModalUrls(root, baseUrl) {
  let adjustedBase = baseUrl;
  try {
    const urlObj = new URL(baseUrl);
    if (urlObj.pathname.startsWith('/products/') || urlObj.pathname.startsWith('/weekly/')) {
      adjustedBase = urlObj.origin + '/';
    }
  } catch (e) {}
  root.querySelectorAll('[src]').forEach(el => {
    const value = el.getAttribute('src');
    if (value && !value.startsWith('http') && !value.startsWith('data:')) {
      el.setAttribute('src', new URL(value, adjustedBase).href);
    }
  });
  root.querySelectorAll('[href]').forEach(el => {
    const value = el.getAttribute('href');
    if (value && !value.startsWith('http') && !value.startsWith('#') && !value.startsWith('mailto:')) {
      el.setAttribute('href', new URL(value, adjustedBase).href);
    }
  });
}

async function openProductModal(detailUrl, name, updateHistory = true) {
  _ensureModalRefs();
  const absoluteUrl = new URL(detailUrl, window.location.origin + '/').href;
  detailUrl = absoluteUrl;
  modalTitle.textContent = name;
  modalBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--c-text-3)">加载中...</div>';
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
  isModalOpen = true;
  if (updateHistory) {
    lastListUrl = window.location.href;
    history.pushState({ productModal: true, url: detailUrl }, '', detailUrl);
  }
  try {
    const resp = await fetch(detailUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const html = await resp.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const detailContent = doc.querySelector('#product-detail-content');
    if (detailContent) {
      rebaseModalUrls(detailContent, new URL(detailUrl, window.location.href).href);
      modalBody.replaceChildren(detailContent);
      if (typeof initStarButtons === 'function') initStarButtons(modalBody);
      if (typeof Fancybox !== 'undefined') {
        Fancybox.bind(modalBody, '[data-fancybox]', { Thumbs: false, parentEl: document.body });
      }
    } else {
      throw new Error('详情主体不存在');
    }
  } catch (err) {
    modalBody.innerHTML = '<div style="text-align:center;padding:40px;color:var(--c-text-3)">加载失败，请<a href="' + detailUrl + '" style="color:var(--c-accent);font-weight:600">打开详情页</a></div>';
  }
  modal.scrollTop = 0;
}

function closeProductModal(updateHistory = true) {
  if (!isModalOpen) return;
  _ensureModalRefs();
  modal.classList.remove('active');
  document.body.style.overflow = '';
  isModalOpen = false;
  if (typeof Fancybox !== 'undefined') {
    try { Fancybox.close(); } catch(e) {}
  }
  if (updateHistory && lastListUrl) {
    history.pushState({}, '', lastListUrl);
    lastListUrl = null;
  }
}

function _isFancyboxOpen() {
  return document.querySelector('.fancybox__container') !== null;
}

// 遮罩点击关闭
document.addEventListener('click', function(e) {
  _ensureModalRefs();
  if (e.target === modal) closeProductModal();
});

// ESC 关闭
document.addEventListener('keydown', function(e) {
  _ensureModalRefs();
  if (e.key === 'Escape' && modal.classList.contains('active')) {
    if (_isFancyboxOpen()) return;
    closeProductModal();
  }
});

// 浏览器前进/后退
window.addEventListener('popstate', function(e) {
  _ensureModalRefs();
  if (e.state && e.state.productModal) {
    const detailUrl = e.state.url;
    const name = detailUrl.split('/').pop().replace('.html', '');
    openProductModal(detailUrl, decodeURIComponent(name), false);
  } else if (isModalOpen) {
    closeProductModal(false);
  }
});

// 页面加载时检查 URL 是否为产品详情页（深度链接）
(function() {
  _ensureModalRefs();
  const path = window.location.pathname;
  const match = path.match(/\/products\/([a-z0-9-]+)\.html$/i);
  if (match && window.matchMedia('(min-width: 769px)').matches) {
    const slug = match[1];
    openProductModal(window.location.href, slug, false);
  }
})();


    const PAGE_SIZE = 5;
    let starredProducts = [];
    let allProducts = [];
    let shown = 0;

    function renderProduct(p) {
      const slug = (p.slug || '').toLowerCase();
      const thumb = p.screenshotUrl
        ? `<img src="${p.screenshotUrl}" alt="${p.name}" loading="lazy">`
        : (p.appStoreScreenshots && p.appStoreScreenshots.length
          ? `<img src="${p.appStoreScreenshots[0]}" alt="${p.name}" loading="lazy">`
          : '<div class="ph"></div>');
      const tags = (p.tags || []).slice(0, 3).map(t => `<span class="mini-tag">${t}</span>`).join('');
      return `
        <div class="product-item" data-slug="${slug}">
          <a href="products/${slug}.html" class="product-link">
            <div class="product-thumb">${thumb}</div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <p class="product-desc">${p.description || ''}</p>
              <div class="product-meta">
                <span class="product-score">${p.score || '-'}</span>
                <span class="product-date">${p.date}</span>
                <div class="product-tags">${tags}</div>
              </div>
            </div>
          </a>
          <button class="unstar-btn" data-slug="${slug}" onclick="unstarProduct(this)" title="取消标星" aria-label="取消标星">✕</button>
        </div>`;
    }

    function renderBatch() {
      const list = document.getElementById('product-list');
      const end = Math.min(shown + PAGE_SIZE, starredProducts.length);
      for (let i = shown; i < end; i++) {
        list.insertAdjacentHTML('beforeend', renderProduct(starredProducts[i]));
      }
      shown = end;
      const existingBtn = document.getElementById('load-more');
      if (existingBtn) existingBtn.remove();
      if (shown < starredProducts.length) {
        const btn = document.createElement('button');
        btn.id = 'load-more';
        btn.className = 'load-more-btn';
        btn.textContent = `查看更多（剩余 ${starredProducts.length - shown} 个）`;
        btn.onclick = renderBatch;
        list.appendChild(btn);
      }
    }

    function unstarProduct(btn) {
      const slug = (btn.getAttribute('data-slug') || '').toLowerCase();
      if (!slug) return;
      let arr = getStarredSlugs();
      const idx = arr.indexOf(slug);
      if (idx !== -1) {
        arr.splice(idx, 1);
        saveStarredSlugs(arr);
      }
      const item = btn.closest('.product-item');
      if (item) {
        item.style.transition = 'opacity .2s, transform .2s';
        item.style.opacity = '0';
        item.style.transform = 'translateX(20px)';
        setTimeout(() => {
          item.remove();
          starredProducts = starredProducts.filter(p => (p.slug || '').toLowerCase() !== slug);
          updateCount();
          if (starredProducts.length === 0) showEmpty();
        }, 200);
      }
      updateStarBadges();
      window.dispatchEvent(new CustomEvent('star-changed', { detail: { slug: slug, starred: false } }));
    }

    function updateCount() {
      const el = document.getElementById('star-count');
      if (el) el.textContent = `共 ${starredProducts.length} 个标星产品`;
    }

    function showEmpty() {
      document.getElementById('product-list').innerHTML =
        '<div class="no-results">' +
        '<div class="empty-ic">⭐</div>' +
        '<p>还没有标星的产品</p>' +
        '<p style="font-size:.85rem;margin-top:8px">在产品详情页点击「标星」按钮，即可在此处查看</p>' +
        '<a href="./" class="load-more-btn" style="display:inline-block;margin-top:20px">去发现产品</a>' +
        '</div>';
    }

    function renderList() {
      const list = document.getElementById('product-list');
      list.innerHTML = '';
      shown = 0;
      if (starredProducts.length === 0) {
        showEmpty();
        return;
      }
      updateCount();
      renderBatch();
    }

    function refreshFromStorage() {
      const slugs = getStarredSlugs();
      const slugSet = new Set(slugs.map(s => String(s).toLowerCase()));
      starredProducts = allProducts.filter(p => slugSet.has((p.slug || '').toLowerCase()));
      starredProducts.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      renderList();
    }

    async function init() {
      try {
        const resp = await fetch('all-products.json');
        allProducts = await resp.json();
      } catch (e) {
        document.getElementById('product-list').innerHTML = '<div class="no-results">数据加载失败，请刷新重试</div>';
        return;
      }
      refreshFromStorage();
    }

    init();

    // 监听标星变化实时同步（Modal 内取消标星 / 其他标签页）
    window.addEventListener('star-changed', function() { refreshFromStorage(); });
    window.addEventListener('storage', function(e) {
      if (e.key === STAR_KEY) refreshFromStorage();
    });

    // 星标页：产品点击用 Modal 打开详情（桌面端，事件委托适配动态渲染）
    (function() {
      if (!window.matchMedia('(min-width: 769px)').matches) return;
      document.addEventListener('click', function(e) {
        const link = e.target.closest('.product-item a[href]');
        if (!link) return;
        if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        e.preventDefault();
        const item = link.closest('.product-item');
        const name = (item && item.querySelector('.product-name')) ? item.querySelector('.product-name').textContent.trim() : '';
        openProductModal(link.getAttribute('href'), name);
      });
    })();

  </script>
